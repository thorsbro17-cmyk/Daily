<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DAILY">
<meta name="theme-color" content="#0a0a0a">
<title>DAILY</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #222; --text: #f0ede8;
    --muted: #555; --accent: #c8f55a; --weekly: #7eb8f7; --done-text: #333; --radius: 14px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    min-height: 100dvh;
    padding-top: max(env(safe-area-inset-top), 20px);
    padding-bottom: max(env(safe-area-inset-bottom), 32px);
    padding-left: 20px; padding-right: 20px;
    overscroll-behavior: none;
  }

  /* TOP NAV */
  .top-nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 0 0;
  }
  .nav-title { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  .nav-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer;
    padding: 7px 14px; letter-spacing: 0.04em; transition: all 0.2s;
  }
  .nav-btn:active { border-color: var(--accent); color: var(--accent); }

  header { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 0 20px; }
  .day-label { font-size: 42px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; color: var(--text); }
  .day-name { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .progress-wrap { text-align: right; }
  .progress-count { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); line-height: 1; }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .progress-bar { width: 100%; height: 2px; background: var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; margin-top: 24px; padding-left: 2px; }
  .checklist { display: flex; flex-direction: column; gap: 8px; }
  .item { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px 16px; cursor: pointer; transition: all 0.2s ease; user-select: none; -webkit-user-select: none; }
  .item:active { transform: scale(0.98); background: #1a1a1a; }
  .item.checked { border-color: #1e1e1e; }
  .item.checked .item-text { color: var(--done-text); text-decoration: line-through; text-decoration-color: #2a2a2a; }
  .item.weekly .check-circle { border-color: var(--weekly); }
  .item.weekly.checked .check-circle { background: var(--weekly); border-color: var(--weekly); }
  .item.checked .check-circle { background: var(--accent); border-color: var(--accent); }
  .check-circle { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
  .check-circle svg { opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
  .item.checked .check-circle svg { opacity: 1; transform: scale(1); }
  .item-text { font-size: 15px; font-weight: 400; line-height: 1.35; color: var(--text); transition: color 0.2s ease; flex: 1; }
  .weekly-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--weekly); background: rgba(126,184,247,0.1); padding: 3px 7px; border-radius: 6px; flex-shrink: 0; }
  .all-done { display: none; text-align: center; padding: 32px 0 16px; }
  .all-done.visible { display: block; }
  .all-done-emoji { font-size: 40px; margin-bottom: 10px; }
  .all-done-text { font-size: 16px; color: var(--accent); font-weight: 500; }
  .all-done-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .reset-btn { display: block; width: 100%; margin-top: 32px; padding: 14px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); font-size: 13px; font-family: inherit; cursor: pointer; letter-spacing: 0.04em; transition: all 0.2s; }
  .reset-btn:active { color: var(--text); border-color: #444; }

  /* CALENDAR */
  #calendarView { display: none; }
  .cal-back { background: transparent; border: none; color: var(--accent); font-size: 14px; font-family: inherit; cursor: pointer; padding: 20px 0 4px; display: block; }
  .cal-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
  .streak-pill { display: inline-block; font-size: 12px; font-weight: 600; background: rgba(200,245,90,0.1); color: var(--accent); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(200,245,90,0.2); margin-bottom: 24px; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 8px; }
  .cal-weekday { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 6px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal-day { aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; position: relative; transition: transform 0.15s; }
  .cal-day.empty { pointer-events: none; }
  .cal-day.future { color: #2a2a2a; pointer-events: none; }
  .cal-day.today { color: var(--text); }
  .cal-day.today::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .cal-day.complete { background: var(--accent); color: #0a0a0a; font-weight: 700; }
  .cal-day.partial { background: rgba(200,245,90,0.2); color: var(--accent); }
  .cal-day:not(.future):not(.empty):active { transform: scale(0.9); }
  .cal-legend { display: flex; gap: 16px; margin-top: 24px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1a1a; border-radius: 24px 24px 0 0; width: 100%; padding: 20px 20px max(env(safe-area-inset-bottom),24px); }
  .modal-handle { width: 36px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 20px; }
  .modal-date { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal-mark-btn { width: 100%; padding: 14px; border-radius: var(--radius); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid var(--accent); background: transparent; color: var(--accent); margin-bottom: 8px; }
  .modal-mark-btn.marked { background: var(--accent); color: #0a0a0a; }
  .modal-close { width: 100%; padding: 14px; border-radius: var(--radius); font-family: inherit; font-size: 14px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); }
</style>
</head>
<body>

<div id="checklistView">
  <div class="top-nav">
    <span class="nav-title">DAILY — July 2026</span>
    <button class="nav-btn" onclick="openCalendar()">📅 July</button>
  </div>
  <header>
    <div>
      <div class="day-label" id="dayNum"></div>
      <div class="day-name" id="dayName"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-count"><span id="doneCount">0</span><span style="color:var(--muted);font-size:22px;font-weight:400"> / <span id="totalCount"></span></span></div>
      <div class="progress-label">today</div>
    </div>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="section-label">Daily</div>
  <div class="checklist" id="dailyList"></div>
  <div class="section-label">Weekly</div>
  <div class="checklist" id="weeklyList"></div>
  <div class="all-done" id="allDone">
    <div class="all-done-emoji">✦</div>
    <div class="all-done-text">All done.</div>
    <div class="all-done-sub" id="allDoneSub"></div>
  </div>
  <button class="reset-btn" onclick="resetDay()">Reset today</button>
</div>

<div id="calendarView">
  <button class="cal-back" onclick="closeCalendar()">← Back to today</button>
  <div class="cal-title">July 2026</div>
  <div class="streak-pill" id="streakPill">✦ Start your streak</div>
  <div class="cal-weekdays">
    <div class="cal-weekday">S</div><div class="cal-weekday">M</div><div class="cal-weekday">T</div>
    <div class="cal-weekday">W</div><div class="cal-weekday">T</div><div class="cal-weekday">F</div><div class="cal-weekday">S</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="cal-legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Complete</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(200,245,90,0.25)"></div> Partial</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a1a1a;border:1px solid #333"></div> Missed</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-sub" id="modalSub"></div>
    <button class="modal-mark-btn" id="modalMarkBtn" onclick="toggleOverride()"></button>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const DAILY = [
  "Draw something","Read for 10 mins","No shows before bed","Take one photo",
  "Journal — thoughts + gratitude for 1 thing","Leave one genuine comment while scrolling",
  "Text someone you haven't talked to in a while","Listen to / read news · job search","Do something active"
];
const WEEKLY = [{ text: "Finance tracker — log all money spent this week" }];
const TOTAL = DAILY.length + WEEKLY.length;

function dateKey(d) { return `july_daily_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`; }
function weekKey(d) { const ws=new Date(d); ws.setDate(d.getDate()-d.getDay()); return `july_weekly_${ws.getFullYear()}_${ws.getMonth()}_${ws.getDate()}`; }
function todayKey() { return dateKey(new Date()); }
function todayWeekKey() { return weekKey(new Date()); }
function loadRaw(key) { try { const r=localStorage.getItem(key); return r?JSON.parse(r):{}; } catch { return {}; } }
function saveRaw(key,val) { try { localStorage.setItem(key,JSON.stringify(val)); } catch {} }

let dailyState = loadRaw(todayKey());
let weeklyState = loadRaw(todayWeekKey());

function renderHeader() {
  const now=new Date(), days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dayNum').textContent=now.getDate();
  document.getElementById('dayName').textContent=days[now.getDay()];
}

function renderList() {
  const dl=document.getElementById('dailyList'), wl=document.getElementById('weeklyList');
  dl.innerHTML=''; wl.innerHTML='';
  document.getElementById('totalCount').textContent=TOTAL;
  DAILY.forEach((text,i) => {
    const checked=!!dailyState[i], div=document.createElement('div');
    div.className='item'+(checked?' checked':'');
    div.innerHTML=`<div class="check-circle"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="item-text">${text}</span>`;
    div.addEventListener('click',()=>{ dailyState[i]=!dailyState[i]; saveRaw(todayKey(),dailyState); renderList(); });
    dl.appendChild(div);
  });
  WEEKLY.forEach((item,i) => {
    const checked=!!weeklyState[i], div=document.createElement('div');
    div.className='item weekly'+(checked?' checked':'');
    div.innerHTML=`<div class="check-circle"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="item-text">${item.text}</span><span class="weekly-badge">Weekly</span>`;
    div.addEventListener('click',()=>{ weeklyState[i]=!weeklyState[i]; saveRaw(todayWeekKey(),weeklyState); renderList(); });
    wl.appendChild(div);
  });
  updateProgress();
}

function updateProgress() {
  const done=Object.values(dailyState).filter(Boolean).length+Object.values(weeklyState).filter(Boolean).length;
  document.getElementById('doneCount').textContent=done;
  document.getElementById('progressFill').style.width=(done/TOTAL*100)+'%';
  const el=document.getElementById('allDone');
  if(done===TOTAL){ el.classList.add('visible'); document.getElementById('allDoneSub').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); }
  else el.classList.remove('visible');
}

function resetDay() { if(confirm("Reset today's checks?")){ dailyState={}; saveRaw(todayKey(),dailyState); renderList(); } }

function openCalendar() {
  document.getElementById('checklistView').style.display='none';
  document.getElementById('calendarView').style.display='block';
  renderCalendar();
}
function closeCalendar() {
  document.getElementById('calendarView').style.display='none';
  document.getElementById('checklistView').style.display='block';
}

function getDayDone(date) {
  const ok=localStorage.getItem('override_'+dateKey(date));
  if(ok==='complete') return TOTAL;
  return Object.values(loadRaw(dateKey(date))).filter(Boolean).length;
}

function calcStreak() {
  const today=new Date(); let streak=0;
  for(let i=0;i<31;i++){
    const d=new Date(2026,6,today.getDate()-i);
    if(d.getMonth()!==6||d.getFullYear()!==2026) break;
    if(d>today) continue;
    if(getDayDone(d)===TOTAL) streak++;
    else if(i>0) break;
  }
  return streak;
}

function renderCalendar() {
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  const today=new Date();
  const firstDay=new Date(2026,6,1).getDay();
  for(let i=0;i<firstDay;i++){ const e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e); }
  for(let d=1;d<=31;d++){
    const date=new Date(2026,6,d), cell=document.createElement('div');
    cell.textContent=d;
    const isToday=d===today.getDate()&&today.getMonth()===6&&today.getFullYear()===2026;
    const isFuture=date>today;
    if(isFuture){ cell.className='cal-day future'; }
    else {
      const done=getDayDone(date);
      let cls='cal-day';
      if(isToday) cls+=' today';
      if(done===TOTAL) cls+=' complete';
      else if(done>0) cls+=' partial';
      cell.className=cls;
      cell.addEventListener('click',()=>openModal(date));
    }
    grid.appendChild(cell);
  }
  const s=calcStreak();
  document.getElementById('streakPill').textContent=s>0?`🔥 ${s} day streak`:'✦ Start your streak';
}

let _modalDate=null;
function openModal(date) {
  _modalDate=date;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('modalDate').textContent=`${days[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}`;
  const done=getDayDone(date);
  document.getElementById('modalSub').textContent=done===TOTAL?'All tasks completed ✦':`${done} of ${TOTAL} tasks done`;
  const btn=document.getElementById('modalMarkBtn');
  if(done===TOTAL){ btn.textContent='Unmark as complete'; btn.classList.add('marked'); }
  else { btn.textContent='Mark day as complete'; btn.classList.remove('marked'); }
  document.getElementById('modalOverlay').classList.add('open');
}
function toggleOverride() {
  if(!_modalDate) return;
  const k='override_'+dateKey(_modalDate);
  if(getDayDone(_modalDate)===TOTAL) localStorage.removeItem(k);
  else localStorage.setItem(k,'complete');
  closeModal(); renderCalendar();
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); _modalDate=null; }
document.getElementById('modalOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modalOverlay')) closeModal(); });

renderHeader(); renderList();

setInterval(()=>{ const k=todayKey(); if(window._ldk&&window._ldk!==k){dailyState={};renderList();} window._ldk=k; },60000);
window._ldk=todayKey();
</script>
</body>
</html>
